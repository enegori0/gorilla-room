<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>フォロワー目標ウィジェット</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Fredoka',sans-serif; background:#f5f0ff; color:#2d2040; overflow-x:hidden; }

/* ── ログイン画面 ── */
#login { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.login-card {
  background:white; border-radius:24px; overflow:hidden;
  width:460px; max-width:100%;
  box-shadow:0 8px 40px rgba(100,60,200,0.13);
}
.login-header {
  background:linear-gradient(135deg,#9b72d8,#b48fe0);
  padding:28px 32px 22px;
  text-align:center;
}
.login-header .logo { font-size:40px; margin-bottom:6px; display:block; }
.login-header h1 { color:white; font-size:22px; font-weight:700; letter-spacing:-0.3px; }
.login-header p { color:rgba(255,255,255,0.8); font-size:13px; margin-top:4px; }

/* ── 設定エリア ── */
.setup-body { padding:24px 28px 20px; }
.setup-section-title {
  font-size:13px; font-weight:700; color:#7c5cb8;
  letter-spacing:0.5px; text-transform:uppercase;
  margin-bottom:14px; display:flex; align-items:center; gap:6px;
}
.setup-section-title::before { content:''; display:block; width:12px; height:12px; background:#9b72d8; border-radius:3px; }

.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; color:#8a7aaa; margin-bottom:5px; font-weight:600; }
.field input[type=text],
.field input[type=number],
.field select {
  width:100%; background:#f8f5ff; border:1.5px solid #e0d8f0;
  border-radius:10px; color:#2d2040; font-size:14px;
  font-family:'Fredoka',sans-serif;
  padding:9px 13px; outline:none; transition:border-color 0.15s;
}
.field input:focus, .field select:focus { border-color:#9b72d8; background:white; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* チェックボックス */
.check-row { display:flex; align-items:center; gap:9px; margin-bottom:10px; cursor:pointer; }
.check-row input[type=checkbox] { width:16px; height:16px; accent-color:#9b72d8; cursor:pointer; }
.check-row span { font-size:13px; color:#5a4870; }

/* ── スライダー ── */
.slider-row { margin-bottom:16px; }
.slider-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.slider-label span { font-size:12px; color:#8a7aaa; font-weight:600; }
.slider-label .slider-val { font-size:12px; color:#9b72d8; font-weight:700; background:#f0e8ff; padding:2px 8px; border-radius:20px; }
input[type=range] {
  -webkit-appearance:none; width:100%; height:6px;
  background:#e8e0f5; border-radius:3px; outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:18px; height:18px;
  border-radius:50%; background:#d44f8e;
  box-shadow:0 2px 6px rgba(212,79,142,0.4); cursor:pointer;
}

/* ── カラーピッカー ── */
.color-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.color-item { display:flex; flex-direction:column; align-items:center; gap:5px; }
.color-item label { font-size:11px; color:#8a7aaa; text-align:center; line-height:1.3; }
.color-item input[type=color] {
  width:44px; height:36px; border:1.5px solid #e0d8f0;
  border-radius:8px; cursor:pointer; background:none; padding:2px;
}
.color-item input[type=color]::-webkit-color-swatch-wrapper { padding:0; border-radius:6px; }
.color-item input[type=color]::-webkit-color-swatch { border:none; border-radius:5px; }

/* ── プリセットアイコン ── */
.preset-icons { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
.preset-icon {
  width:40px; height:40px; border-radius:50%; border:2px solid #e0d8f0;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; cursor:pointer; background:#f8f5ff; transition:all 0.15s;
}
.preset-icon:hover { border-color:#9b72d8; background:#f0e8ff; transform:scale(1.08); }
.preset-icon.selected { border-color:#d44f8e; background:#ffe0ef; box-shadow:0 0 0 3px rgba(212,79,142,0.15); }

/* ── URLフィールド ── */
.url-area { background:#f8f5ff; border:1.5px solid #e0d8f0; border-radius:10px; padding:10px 13px; margin-bottom:10px; }
.url-area p { font-size:11px; color:#9b72d8; margin-bottom:5px; font-weight:600; }
textarea { width:100%; background:transparent; border:none; color:#5a4870; font-size:11px; font-family:monospace; resize:none; height:46px; outline:none; word-break:break-all; }

/* ── ボタン ── */
.twitch-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:13px; border:none; border-radius:12px;
  background:#9147ff; color:white; font-size:15px; font-weight:700;
  font-family:'Fredoka',sans-serif; cursor:pointer; transition:all 0.18s;
  margin-top:4px; box-shadow:0 4px 16px rgba(145,71,255,0.3);
}
.twitch-btn:hover { background:#7d3cdf; transform:translateY(-1px); box-shadow:0 6px 20px rgba(145,71,255,0.4); }
.copy-btn {
  width:100%; padding:10px; background:#9b72d8; color:white;
  border:none; border-radius:10px; font-size:14px; font-weight:700;
  font-family:'Fredoka',sans-serif; cursor:pointer; margin-bottom:8px;
  transition:background 0.15s;
}
.copy-btn:hover { background:#7c5cb8; }
.reset-btn {
  width:100%; padding:9px; background:#f8f5ff; color:#8a7aaa;
  border:1.5px solid #e0d8f0; border-radius:10px; font-size:13px; font-weight:600;
  font-family:'Fredoka',sans-serif; cursor:pointer; transition:all 0.15s;
}
.reset-btn:hover { background:#f0e8ff; color:#7c5cb8; border-color:#c4a8f0; }

.obs-hint { background:#efffee; border-left:3px solid #6dbf6d; border-radius:8px; padding:8px 12px; font-size:12px; color:#5a7a5a; line-height:1.6; }
.obs-hint b { color:#4a8a4a; }

.divider { border:none; border-top:1.5px solid #f0e8f8; margin:18px 0; }

/* レイアウト 2カラム（設定画面） */
.setup-cols { display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start; }

/* ── ウィジェット ── */
#widget { display:none; }
.confetti-pc { position:absolute; display:block; border-radius:2px; animation:cf linear forwards; }
@keyframes cf { 0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:1} 80%{opacity:1} 100%{transform:translateY(120%) translateX(var(--drift)) rotate(var(--rot));opacity:0} }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="login-header">
      <span class="logo">🎮</span>
      <h1>フォロワー目標ウィジェット</h1>
      <p>OBSブラウザソース用 — 設定してTwitchでログイン！</p>
    </div>

    <div class="setup-body">
      <div class="setup-cols">
        <!-- 左カラム -->
        <div>
          <div class="setup-section-title">基本設定</div>

          <div class="field">
            <label>タイトル（空白にすると非表示）</label>
            <input type="text" id="iTitle" value="フォロワー目標" placeholder="フォロワー目標">
          </div>

          <div class="row2">
            <div class="field">
              <label>現在 (Current)</label>
              <input type="number" id="iCurrent" value="0" min="0">
            </div>
            <div class="field">
              <label>目標 (Max)</label>
              <input type="number" id="iGoal" value="500" min="1">
            </div>
          </div>

          <div class="check-row">
            <input type="checkbox" id="iShowCount" checked>
            <span>カウンターを表示する</span>
          </div>
          <div class="check-row">
            <input type="checkbox" id="iShowFrame" checked>
            <span>外枠（背景）を表示する</span>
          </div>

          <div class="field" style="margin-top:12px;">
            <label>デザインテーマ</label>
            <select id="iTheme">
              <option value="battery">A · 電池（チャージ）</option>
              <option value="bear">B · 熊マスコット</option>
              <option value="plant">C · 植物（開花）</option>
              <option value="rocket">D · ロケット</option>
              <option value="coinjar">E · コイン瓶</option>
              <option value="mountain">F · 山登り</option>
              <option value="battery-h">A横 · 電池（横型）</option>
              <option value="rocket-h">D横 · ロケット（横型）</option>
              <option value="mendako">🩷 メンダコ</option>
            </select>
          </div>

          <div class="field">
            <label>自動増加人数（0=無効）</label>
            <input type="number" id="iStep" value="0" min="0">
          </div>

          <hr class="divider">
          <div class="setup-section-title">プリセット アイコン</div>
          <div class="preset-icons" id="presetIcons">
            <div class="preset-icon selected" data-icon="🐝">🐝</div>
            <div class="preset-icon" data-icon="⭐">⭐</div>
            <div class="preset-icon" data-icon="🐰">🐰</div>
            <div class="preset-icon" data-icon="❤️">❤️</div>
            <div class="preset-icon" data-icon="🐾">🐾</div>
            <div class="preset-icon" data-icon="🦊">🦊</div>
            <div class="preset-icon" data-icon="🐱">🐱</div>
            <div class="preset-icon" data-icon="🦍">🦍</div>
          </div>
          <div class="field" style="margin-top:10px;">
            <label>イラストURL（URLが優先されます）</label>
            <input type="text" id="iIconUrl" placeholder="https://...">
          </div>
        </div>

        <!-- 右カラム -->
        <div>
          <div class="setup-section-title">表示設定</div>

          <div class="slider-row">
            <div class="slider-label">
              <span>アイコンの大きさ (Icon Size)</span>
              <span class="slider-val" id="iconSizeVal">54px</span>
            </div>
            <input type="range" id="iIconSize" min="20" max="120" value="54" oninput="document.getElementById('iconSizeVal').textContent=this.value+'px'">
          </div>

          <div class="slider-row">
            <div class="slider-label">
              <span>全体の大きさ (Widget Scale)</span>
              <span class="slider-val" id="scaleVal">1.6x</span>
            </div>
            <input type="range" id="iScale" min="0.5" max="3" step="0.1" value="1.6" oninput="document.getElementById('scaleVal').textContent=parseFloat(this.value).toFixed(1)+'x'">
          </div>

          <div class="slider-row">
            <div class="slider-label">
              <span>バーの太さ (Bar Height)</span>
              <span class="slider-val" id="barHeightVal">18px</span>
            </div>
            <input type="range" id="iBarHeight" min="6" max="40" value="18" oninput="document.getElementById('barHeightVal').textContent=this.value+'px'">
          </div>

          <hr class="divider">
          <div class="setup-section-title">カラー設定</div>
          <div class="color-grid">
            <div class="color-item">
              <label>外枠の背景色<br>(bg-color)</label>
              <input type="color" id="cBg" value="#ffffff">
            </div>
            <div class="color-item">
              <label>バーの底色<br>(track-bg)</label>
              <input type="color" id="cTrack" value="#ffd8e8">
            </div>
            <div class="color-item">
              <label>進捗バーの色<br>(fill-color)</label>
              <input type="color" id="cFill" value="#f5a0c0">
            </div>
            <div class="color-item">
              <label>タイトルの色<br>(text-main)</label>
              <input type="color" id="cTextMain" value="#444444">
            </div>
            <div class="color-item">
              <label>カウンターの色<br>(text-sub)</label>
              <input type="color" id="cTextSub" value="#e87aaa">
            </div>
            <div class="color-item">
              <label>アイコン背景色<br>(icon-bg)</label>
              <input type="color" id="cIconBg" value="#fff0f6">
            </div>
          </div>

          <hr class="divider">
          <button class="reset-btn" onclick="resetSettings()">設定をデフォルトに戻す</button>
        </div>
      </div>

      <hr class="divider">

      <button class="twitch-btn" id="loginBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
        Twitchでログイン
      </button>

      <div id="urlSection" style="display:none;margin-top:16px;">
        <div class="url-area">
          <p>✅ このURLをOBSのブラウザソースに貼り付けてください</p>
          <textarea id="urlText" readonly></textarea>
        </div>
        <button class="copy-btn" id="copyBtn">URLをコピー</button>
      <div class="obs-hint">
        <b>OBS設定：</b> 幅 <b>372</b> / 高さ <b>462</b>（横型は高さ <b>210</b>）
      </div>
    </div>
  </div>
</div>

<div id="widget">
  <div id="w-root"></div>
</div>

<script>
// ── 設定 ──
// ※ このClient IDはtwitchtokengenerator.comのものを使用
// ※ GitHub Pagesで公開するためPublicでも問題なし
var CLIENT_ID = 'q3qw3df80v2h7ufej054yhicp7yrxu';
var REDIRECT_URI = 'https://enegori0.github.io/obs-follower-widget/';

// ── URLパラメーター読み込み ──
var params = new URLSearchParams(location.search);
var tok      = params.get('tok') || '';
var username = params.get('u')   || '';
var goal     = parseInt(params.get('g')) || 500;
var theme    = params.get('t')   || 'battery';
var step     = parseInt(params.get('s')) || 0;

// ── モード判定 ──
var isWidget = !!(tok && username);

if (isWidget) {
  document.getElementById('login').style.display = 'none';
  document.getElementById('widget').style.display = 'block';
} else {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('widget').style.display = 'none';

  // Twitchコールバック処理（#access_token=...）
  if (location.hash && location.hash.includes('access_token')) {
    var hp = new URLSearchParams(location.hash.replace('#',''));
    var accessToken = hp.get('access_token');
    var stateKey = hp.get('state');
    var st = {};
    // localStorageから設定値を取得
    try {
      var saved = localStorage.getItem('tw_state_'+stateKey);
      if (saved) { st = JSON.parse(saved); localStorage.removeItem('tw_state_'+stateKey); }
    } catch(e){}
    history.replaceState(null,'',location.pathname);

    if (accessToken) {
      fetch('https://api.twitch.tv/helix/users', {
        headers:{'Client-ID':CLIENT_ID,'Authorization':'Bearer '+accessToken}
      })
      .then(function(r){return r.json();})
      .then(function(d){
        var uname = d.data && d.data[0] ? d.data[0].login : '';
        var base = location.origin + location.pathname.replace(/\/?$/,'/');
        var url = base
          + '?tok=' + encodeURIComponent(accessToken)
          + '&u='   + encodeURIComponent(uname)
          + '&g='   + (st.g||500)
          + '&t='   + (st.t||'battery')
          + '&s='   + (st.s||0);
        document.getElementById('urlText').value = url;
        document.getElementById('urlSection').style.display = 'block';
        if(st.t) document.getElementById('iTheme').value = st.t;
        if(st.g) document.getElementById('iGoal').value = st.g;
        if(st.s) document.getElementById('iStep').value = st.s;
      })
      .catch(function(){alert('ユーザー情報取得に失敗しました。もう一度お試しください。');});
    }
  }

  // ログインボタン

  // ── プリセットアイコン選択 ──
  document.getElementById('presetIcons').addEventListener('click',function(e){
    var btn=e.target.closest('.preset-icon');if(!btn)return;
    document.querySelectorAll('.preset-icon').forEach(function(b){b.classList.remove('selected');});
    btn.classList.add('selected');
  });

  // ── 設定リセット ──
  window.resetSettings=function(){
    document.getElementById('iTitle').value='フォロワー目標';
    document.getElementById('iCurrent').value='0';
    document.getElementById('iGoal').value='500';
    document.getElementById('iStep').value='0';
    document.getElementById('iShowCount').checked=true;
    document.getElementById('iShowFrame').checked=true;
    document.getElementById('iIconSize').value='54';document.getElementById('iconSizeVal').textContent='54px';
    document.getElementById('iScale').value='1.6';document.getElementById('scaleVal').textContent='1.6x';
    document.getElementById('iBarHeight').value='18';document.getElementById('barHeightVal').textContent='18px';
    document.getElementById('cBg').value='#ffffff';
    document.getElementById('cTrack').value='#ffd8e8';
    document.getElementById('cFill').value='#f5a0c0';
    document.getElementById('cTextMain').value='#444444';
    document.getElementById('cTextSub').value='#e87aaa';
    document.getElementById('cIconBg').value='#fff0f6';
    document.getElementById('iIconUrl').value='';
    document.getElementById('iTheme').value='battery';
    document.querySelectorAll('.preset-icon').forEach(function(b,i){b.classList.toggle('selected',i===0);});
  };

  document.getElementById('loginBtn').addEventListener('click', function(){
    var g = parseInt(document.getElementById('iGoal').value)||500;
    var s = parseInt(document.getElementById('iStep').value)||0;
    var t = document.getElementById('iTheme').value;
    // カスタム設定収集
    var extra = {
      title: document.getElementById('iTitle').value,
      showCount: document.getElementById('iShowCount').checked,
      showFrame: document.getElementById('iShowFrame').checked,
      iconSize: document.getElementById('iIconSize').value,
      scale: document.getElementById('iScale').value,
      barHeight: document.getElementById('iBarHeight').value,
      cBg: document.getElementById('cBg').value,
      cTrack: document.getElementById('cTrack').value,
      cFill: document.getElementById('cFill').value,
      cTextMain: document.getElementById('cTextMain').value,
      cTextSub: document.getElementById('cTextSub').value,
      cIconBg: document.getElementById('cIconBg').value,
      iconUrl: document.getElementById('iIconUrl').value,
      icon: (document.querySelector('.preset-icon.selected')||{}).dataset&&document.querySelector('.preset-icon.selected').dataset.icon||'',
    };
    // stateはシンプルなランダム文字列にする（Twitch推奨）
    var stateKey = Math.random().toString(36).substring(2,15);
    // 設定値はlocalStorageに保存
    try { localStorage.setItem('tw_state_'+stateKey, JSON.stringify({g:g,s:s,t:t,extra:extra})); } catch(e){}
    var url = 'https://id.twitch.tv/oauth2/authorize'
      + '?client_id=' + CLIENT_ID
      + '&redirect_uri=' + encodeURIComponent(REDIRECT_URI)
      + '&response_type=token'
      + '&scope=moderator%3Aread%3Afollowers'
      + '&state=' + stateKey;
    location.href = url;
  });

  // コピーボタン
  document.getElementById('copyBtn').addEventListener('click', function(){
    document.getElementById('urlText').select();
    document.execCommand('copy');
    this.textContent = 'コピーしました！';
    var self = this;
    setTimeout(function(){self.textContent = 'URLをコピー';}, 2000);
  });
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
// ウィジェットモードのみReactを起動
if (typeof tok !== 'undefined' && tok && typeof username !== 'undefined' && username) {

var TH = {
  ink:'#15121c',inkDeep:'#0e0b14',vessel:'#221c30',
  line:'rgba(255,255,255,0.08)',textHi:'#f4f0ff',textLo:'#a99fc4',
  font:'"Fredoka",sans-serif',
};
var c01=function(x){return Math.max(0,Math.min(1,x));};
var fm=function(n){return Math.round(n).toLocaleString();};
var ce=React.createElement;
var _=React;

function Confetti(p){
  var pieces=_.useMemo(function(){
    var cols=p.colors||['#9147ff','#ffd23f','#46d6c0','#ff7eb6','#aef34d'];
    return Array.from({length:20},function(_,i){return{left:Math.random()*100,delay:Math.random()*0.4,dur:1.5+Math.random()*1.2,size:4+Math.random()*5,rot:Math.random()*360,color:cols[i%cols.length],round:Math.random()>0.5,drift:(Math.random()-0.5)*60};});
  },[]);
  if(!p.show)return null;
  return ce('div',{style:{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:6}},
    pieces.map(function(pc,i){return ce('span',{key:i,className:'confetti-pc',style:{left:pc.left+'%',top:'-12%',width:pc.size,height:pc.size*(pc.round?1:1.5),background:pc.color,borderRadius:pc.round?'50%':'1px',animationDuration:pc.dur+'s',animationDelay:pc.delay+'s','--drift':pc.drift+'px','--rot':pc.rot+'deg'}});})
  );
}

function Sp(p){
  if(!p.show)return null;
  return ce('g',null,(p.points||[]).map(function(pt,i){
    return ce('g',{key:i,transform:'translate('+pt.x+' '+pt.y+')',opacity:0},
      ce('animate',{attributeName:'opacity',values:'0;1;0',dur:'1.4s',begin:(i*0.18)+'s',repeatCount:'indefinite'}),
      ce('path',{d:'M0 '+-pt.s+' L'+(pt.s*.28)+' '+(-pt.s*.28)+' L'+pt.s+' 0 L'+(pt.s*.28)+' '+(pt.s*.28)+' L0 '+pt.s+' L'+(-pt.s*.28)+' '+(pt.s*.28)+' L'+-pt.s+' 0 L'+(-pt.s*.28)+' '+(-pt.s*.28)+' Z',fill:p.color||'#fff'})
    );
  }));

function MendakoW({count,goal,reached}){
  var pct=c01(count/goal);
  var a='#ff7fb3',a2='#ffc0d9';
  // 幅820 高さ160の専用レイアウト
  var W=900,H=160,TW=680,TX=0,TY=10,TH=140,R=70;
  var canvasRef=_.useRef(null);
  var ftRef=_.useRef(0);
  var rafRef=_.useRef(null);

  _.useEffect(function(){
    var cv=canvasRef.current;
    if(!cv)return;
    var ctx=cv.getContext('2d');

    function tankPath(){
      ctx.beginPath();
      ctx.moveTo(TX+R,TY);ctx.lineTo(TX+TW-R,TY);
      ctx.arcTo(TX+TW,TY,TX+TW,TY+R,R);
      ctx.lineTo(TX+TW,TY+TH-R);
      ctx.arcTo(TX+TW,TY+TH,TX+TW-R,TY+TH,R);
      ctx.lineTo(TX+R,TY+TH);
      ctx.arcTo(TX,TY+TH,TX,TY+TH-R,R);
      ctx.lineTo(TX,TY+R);
      ctx.arcTo(TX,TY,TX+R,TY,R);
      ctx.closePath();
    }

    function drawMendako(cx,cy,ft2){
      ctx.save();ctx.translate(cx,cy);
      // グロー
      var glow=ctx.createRadialGradient(0,0,10,0,0,85);
      glow.addColorStop(0,'rgba(255,220,235,0.55)');
      glow.addColorStop(0.5,'rgba(255,200,225,0.2)');
      glow.addColorStop(1,'rgba(255,200,225,0)');
      ctx.beginPath();ctx.arc(0,0,85,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
      // 触手
      var t2=ft2*0.06;
      var tentacles=[
        {bx:-40,by:30,angle:-0.5,len:38,phase:0},
        {bx:-28,by:38,angle:-0.2,len:42,phase:0.8},
        {bx:-12,by:42,angle:0.05,len:44,phase:1.4},
        {bx:4,by:42,angle:0.2,len:44,phase:2.0},
        {bx:18,by:40,angle:0.35,len:42,phase:2.6},
        {bx:30,by:35,angle:0.55,len:38,phase:3.2},
        {bx:-50,by:16,angle:-0.75,len:34,phase:3.8},
        {bx:42,by:16,angle:0.75,len:34,phase:4.4},
      ];
      tentacles.forEach(function(tn,i){
        var wave=Math.sin(t2+tn.phase)*10;
        var ex=tn.bx+Math.cos(tn.angle+wave*0.04)*tn.len;
        var ey=tn.by+tn.len*0.9;
        var cx2=tn.bx+Math.cos(tn.angle)*tn.len*0.4+wave*0.6;
        var cy2=tn.by+tn.len*0.55+Math.abs(wave)*0.2;
        ctx.beginPath();ctx.moveTo(tn.bx,tn.by);
        ctx.quadraticCurveTo(cx2,cy2,ex+wave*0.5,ey);
        ctx.strokeStyle='rgba(255,175,205,0.9)';
        ctx.lineWidth=i<6?8:7;ctx.lineCap='round';ctx.stroke();
        ctx.strokeStyle='rgba(255,230,242,0.6)';ctx.lineWidth=3;ctx.stroke();
      });
      // 本体
      var BW=150,BH=120,bx=-BW/2,by=-BH/2-4;
      ctx.beginPath();
      ctx.moveTo(bx+BW*0.45,by);
      ctx.bezierCurveTo(bx+BW*0.75,by,bx+BW,by+BH*0.08,bx+BW,by+BH*0.5);
      ctx.bezierCurveTo(bx+BW,by+BH*0.9,bx+BW*0.7,by+BH,bx+BW*0.5,by+BH);
      ctx.bezierCurveTo(bx+BW*0.3,by+BH,bx,by+BH*0.9,bx,by+BH*0.5);
      ctx.bezierCurveTo(bx,by+BH*0.08,bx+BW*0.25,by,bx+BW*0.45,by);
      ctx.closePath();
      var bodyGrd=ctx.createRadialGradient(-10,-30,5,0,-10,75);
      bodyGrd.addColorStop(0,'#fff7fb');bodyGrd.addColorStop(0.4,'#ffe5f0');bodyGrd.addColorStop(1,'#ffc0d9');
      ctx.fillStyle=bodyGrd;ctx.fill();
      ctx.strokeStyle='rgba(255,200,225,0.5)';ctx.lineWidth=2;ctx.stroke();
      // 内側グロー
      var ig=ctx.createRadialGradient(0,-20,5,0,20,70);
      ig.addColorStop(0,'rgba(255,255,255,0.4)');ig.addColorStop(1,'rgba(255,150,190,0.2)');
      ctx.fillStyle=ig;ctx.fill();
      // 目
      ctx.beginPath();ctx.roundRect(-38,-4,18,6,3);ctx.fillStyle='#7b4d67';ctx.fill();
      ctx.beginPath();ctx.roundRect(20,-4,18,6,3);ctx.fill();
      // 頬
      ctx.beginPath();ctx.ellipse(-28,14,14,10,0,0,Math.PI*2);ctx.fillStyle='rgba(255,170,200,0.45)';ctx.fill();
      ctx.beginPath();ctx.ellipse(28,14,14,10,0,0,Math.PI*2);ctx.fill();
      // ハイライト
      ctx.beginPath();ctx.ellipse(-12,-28,22,12,-0.3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.38)';ctx.fill();
      ctx.restore();
    }

    function renderFrame(){
      ftRef.current++;
      var ft2=ftRef.current;
      ctx.clearRect(0,0,W,H);

      // 水槽背景
      tankPath();
      ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();

      // 液体クリップ
      ctx.save();
      tankPath();ctx.clip();
      var fillW=TW*pct;
      var lg=ctx.createLinearGradient(TX,TY,TX,TY+TH);
      lg.addColorStop(0,'#ffd7ea');lg.addColorStop(0.4,'#ffb7d4');lg.addColorStop(1,'#ff94c1');
      ctx.fillStyle=lg;ctx.fillRect(TX,TY,fillW,TH);
      // 波
      var wt=ft2*0.03;
      ctx.beginPath();ctx.moveTo(TX,TY+18);
      for(var i=0;i<=fillW+80;i+=4){
        var wy=TY+18+Math.sin(wt+i*0.04)*5+Math.sin(wt*0.7+i*0.025)*3;
        ctx.lineTo(TX+i,wy);
      }
      ctx.lineTo(TX+fillW,TY);ctx.lineTo(TX,TY);ctx.closePath();
      ctx.fillStyle='rgba(255,255,255,0.28)';ctx.fill();
      // 泡
      [{px:0.15,phase:0,r:9,sp:0.007},{px:0.38,phase:40,r:12,sp:0.006},{px:0.58,phase:20,r:7.5,sp:0.008},{px:0.78,phase:60,r:14,sp:0.005}].forEach(function(b){
        if(b.px>pct)return;
        var bx2=TX+TW*b.px;
        var rawY=((ft2*b.sp*TH+b.phase)%(TH+30));
        var by2=TY+TH-rawY+10;
        var bg2=ctx.createRadialGradient(bx2-b.r*0.3,by2-b.r*0.3,b.r*0.1,bx2,by2,b.r);
        bg2.addColorStop(0,'rgba(255,255,255,0.85)');bg2.addColorStop(0.4,'rgba(255,200,230,0.5)');bg2.addColorStop(1,'rgba(255,180,215,0.15)');
        ctx.beginPath();ctx.arc(bx2,by2,b.r,0,Math.PI*2);ctx.fillStyle=bg2;ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;ctx.stroke();
        ctx.beginPath();ctx.arc(bx2-b.r*0.32,by2-b.r*0.32,b.r*0.38,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();
      });
      ctx.restore();

      // 水槽枠
      tankPath();
      ctx.strokeStyle='rgba(255,182,212,0.85)';ctx.lineWidth=4;ctx.stroke();
      // 内側グロー
      tankPath();ctx.save();ctx.clip();
      var innerGlow=ctx.createRadialGradient(TX+TW*0.5,TY,0,TX+TW*0.5,TY+TH*0.5,TH);
      innerGlow.addColorStop(0,'rgba(255,255,255,0.35)');innerGlow.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=innerGlow;ctx.fillRect(TX,TY,TW,TH);ctx.restore();

      // メンダコ（中央固定）
      var floatY=Math.sin(ft2*0.04)*8;
      drawMendako(TX+TW*0.5, TY+TH*0.5+2+floatY, ft2);

      // 情報パネル
      var IX=TW+30;
      var pctNum=Math.round(pct*100);
      ctx.font='800 20px Nunito,sans-serif';ctx.fillStyle='#ff7fb3';ctx.textAlign='left';
      ctx.fillText('FOLLOWER GOAL',IX,TY+32);
      ctx.font='900 74px Nunito,sans-serif';ctx.fillStyle='#ff7fb3';
      ctx.fillText(pctNum+'%',IX,TY+110);
      ctx.font='700 28px Nunito,sans-serif';ctx.fillStyle='#c0709a';
      ctx.fillText(count.toLocaleString()+' / '+goal.toLocaleString(),IX,TY+145);

      rafRef.current=requestAnimationFrame(renderFrame);
    }

    renderFrame();
    return function(){ if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  },[pct,count,goal]);

  return ce('canvas',{ref:canvasRef,width:W,height:H,style:{display:'block'}});
}
